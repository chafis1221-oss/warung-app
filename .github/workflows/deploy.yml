name: Build & Deploy

on:
  push:
    branches: [main]

env:
  FLUTTER_VERSION: '3.24.0'
  GO_VERSION: '1.21'

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Create keystore from secret
        run: |
          mkdir -p keystore
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore/warung-keystore.jks

      - name: Create key.properties
        run: |
          mkdir -p frontend/android
          cat > frontend/android/key.properties << PROPS
          storeFile=../keystore/warung-keystore.jks
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          PROPS

      - name: Build APK
        run: |
          cd frontend
          flutter pub get
          flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: frontend/build/app/outputs/flutter-apk/app-release.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          files: frontend/build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build Go binary (ARM64)
        run: |
          cd backend
          GOOS=linux GOARCH=arm64 CGO_ENABLED=1 go build -o warung-server main.go

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend
          path: backend/warung-server

  deploy:
    needs: [build-android, build-backend]
    runs-on: ubuntu-latest
    steps:
      - name: Download backend
        uses: actions/download-artifact@v4
        with:
          name: backend

      - name: Deploy to STB
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STB_HOST }}
          username: ${{ secrets.STB_USER }}
          key: ${{ secrets.STB_SSH_KEY }}
          script: |
            systemctl stop warung-server
            mv /mnt/docker/warung-app/warung-server /mnt/docker/warung-app/warung-server.bak 2>/dev/null || true

      - name: Copy binary to STB
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.STB_HOST }}
          username: ${{ secrets.STB_USER }}
          key: ${{ secrets.STB_SSH_KEY }}
          source: "warung-server"
          target: "/mnt/docker/warung-app/"

      - name: Restart service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STB_HOST }}
          username: ${{ secrets.STB_USER }}
          key: ${{ secrets.STB_SSH_KEY }}
          script: |
            chmod +x /mnt/docker/warung-app/warung-server
            systemctl restart warung-server
            systemctl status warung-server --no-pager
