name: Build & Release

on:
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.24.0'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Keystore
      - name: Create keystore
        run: |
          mkdir -p keystore
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore/warung-keystore.jks

      - name: Create key.properties
        run: |
          mkdir -p frontend/android
          cat > frontend/android/key.properties << PROPS
          storeFile=${{ github.workspace }}/keystore/warung-keystore.jks
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          PROPS

      # Build APK
      - name: Build APK
        run: |
          cd frontend
          flutter pub get
          flutter build apk --release

      # Build PWA
      - name: Build PWA
        run: |
          cd frontend
          flutter build web --release

      # Zip PWA
      - name: Zip PWA
        run: |
          cd frontend/build/web
          zip -r ../../../warung-pwa.zip .

      # Upload APK
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: frontend/build/app/outputs/flutter-apk/app-release.apk

      # Upload PWA
      - name: Upload PWA artifact
        uses: actions/upload-artifact@v4
        with:
          name: pwa-release
          path: warung-pwa.zip

      # Create Release
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          files: |
            frontend/build/app/outputs/flutter-apk/app-release.apk
            warung-pwa.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
